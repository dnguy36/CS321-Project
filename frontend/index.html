<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Path Optimizer - GMU</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div id="sidebar">
        <h1>Campus Path Optimizer</h1>
        <p class="subtitle">George Mason University</p>

        <div class="instructions">
            <p><strong>How to use:</strong></p>
            <ol>
                <li>Click the map to set a <span class="start-color">start point</span></li>
                <li>Click again to set a <span class="end-color">destination</span></li>
                <li>The route will be calculated automatically</li>
            </ol>
            <p>Or select from buildings below:</p>
        </div>

        <div class="select-group">
            <label for="start-select">Start:</label>
            <select id="start-select">
                <option value="">-- Click map or select --</option>
            </select>
        </div>
        <div class="select-group">
            <label for="end-select">Destination:</label>
            <select id="end-select">
                <option value="">-- Click map or select --</option>
            </select>
        </div>

        <button id="route-btn" disabled>Find Route</button>
        <button id="clear-btn">Clear</button>

        <div id="route-info" class="hidden">
            <h3>Route Info</h3>
            <p>Distance: <span id="distance">--</span></p>
            <p>Est. Walking Time: <span id="walking-time">--</span></p>
        </div>

        <div id="status" class="hidden"></div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
